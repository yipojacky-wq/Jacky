<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JASIC 股票觀測投資 App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
        <rect x="6" y="8" width="52" height="48" rx="10"></rect>
        <path d="M18 42l9-10 8 6 12-17" fill="none"></path>
        <circle cx="47" cy="21" r="4"></circle>
      </svg>
      <div>
        <h1>JASIC 股票觀測</h1>
        <p>用簡單指標建立觀察清單、風險提醒與參考評分</p>
      </div>
    </div>
    <div class="header-actions">
      <button id="exportBtn" type="button">匯出資料</button>
      <label class="file-button">
        匯入 CSV
        <input id="csvInput" type="file" accept=".csv,text/csv">
      </label>
    </div>
  </header>

  <main class="app-shell">
    <section class="panel input-panel" aria-labelledby="formTitle">
      <div class="panel-heading">
        <h2 id="formTitle">新增觀測標的</h2>
        <span id="editState">新增模式</span>
      </div>
      <form id="stockForm" class="stock-form">
        <label>
          股票代號
          <input id="symbol" name="symbol" required placeholder="例：2330 / AAPL" autocomplete="off">
        </label>
        <label>
          股票名稱
          <input id="name" name="name" required placeholder="例：台積電 / Apple" autocomplete="off">
        </label>
        <label>
          現價
          <input id="price" name="price" required type="number" min="0" step="0.01" placeholder="100">
        </label>
        <label>
          目標價
          <input id="target" name="target" required type="number" min="0" step="0.01" placeholder="120">
        </label>
        <label>
          月營收/營收成長 %
          <input id="growth" name="growth" required type="number" step="0.1" placeholder="8">
        </label>
        <label>
          本益比 PE
          <input id="pe" name="pe" required type="number" min="0" step="0.1" placeholder="18">
        </label>
        <label>
          近 20 日漲跌 %
          <input id="momentum" name="momentum" required type="number" step="0.1" placeholder="5">
        </label>
        <label>
          風險等級
          <select id="risk" name="risk">
            <option value="1">低</option>
            <option value="2" selected>中</option>
            <option value="3">高</option>
          </select>
        </label>
        <label class="wide">
          備註
          <textarea id="notes" name="notes" rows="3" placeholder="例如：法說會後再追蹤、等待回測季線"></textarea>
        </label>
        <div class="form-actions wide">
          <button id="submitBtn" type="submit">加入觀察</button>
          <button id="cancelEditBtn" type="button" class="secondary" hidden>取消編輯</button>
        </div>
      </form>
    </section>

    <section class="dashboard">
      <div class="metrics-grid">
        <article class="metric">
          <span>追蹤檔數</span>
          <strong id="totalCount">0</strong>
        </article>
        <article class="metric">
          <span>平均評分</span>
          <strong id="avgScore">0</strong>
        </article>
        <article class="metric">
          <span>買進觀察</span>
          <strong id="buyCount">0</strong>
        </article>
        <article class="metric">
          <span>高風險</span>
          <strong id="riskCount">0</strong>
        </article>
      </div>

      <section class="panel chart-panel" aria-labelledby="chartTitle">
        <div class="panel-heading">
          <h2 id="chartTitle">評分分布</h2>
          <select id="sortBy" aria-label="排序方式">
            <option value="score">依評分</option>
            <option value="upside">依上漲空間</option>
            <option value="risk">依風險</option>
            <option value="symbol">依代號</option>
          </select>
        </div>
        <canvas id="scoreChart" width="900" height="280" aria-label="股票評分長條圖"></canvas>
      </section>
    </section>

    <section class="panel table-panel" aria-labelledby="tableTitle">
      <div class="panel-heading">
        <h2 id="tableTitle">觀察清單</h2>
        <input id="searchInput" type="search" placeholder="搜尋代號、名稱或備註">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>標的</th>
              <th>現價</th>
              <th>目標價</th>
              <th>上漲空間</th>
              <th>JASIC 分數</th>
              <th>訊號</th>
              <th>風險</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="stockRows"></tbody>
        </table>
      </div>
      <p class="notice">此工具僅供朋友間整理觀察與討論，不構成買賣建議。請自行確認資料來源並控管風險。</p>
    </section>
  </main>

  <template id="emptyTemplate">
    <tr>
      <td colspan="8" class="empty-state">
        尚未新增股票。可以先使用範例資料，或直接新增自己的觀察標的。
        <button id="loadSampleBtn" type="button">載入範例資料</button>
      </td>
    </tr>
  </template>

  <script src="app.js"></script>
</body>
</html>
