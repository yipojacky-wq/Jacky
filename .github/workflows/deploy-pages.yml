name: Update realtime quotes and deploy Pages

on:
  push:
    branches: ["main"]
  schedule:
    # 避開整點高峰；臺北時間週一至週五 09:02–次日 04:57。
    - cron: "2-57/5 1-20 * * 1-5"
    # 補上臺北時間 05:02 前的最後一小段夜盤更新。
    - cron: "2 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch TWSE and TAIFEX realtime quotes
        run: node scripts/update-realtime-quotes.mjs

      - name: Verify quote output
        run: node -e "const q=require('./data/realtime-quotes.json'); if(!q.generatedAt || !q.quotes || q.quotes.length < 500 || !q.markets?.taiex) process.exit(1); console.log(q.generatedAt, q.quotes.length, q.markets)"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
