services:
  - type: web
    name: disclosure-completion-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: APP_DEMO_MODE
        value: "false"
      - key: APP_STORAGE_PATH
        value: /tmp/disclosure-completion-cases.json
      - key: GOOGLE_API_KEY
        sync: false
